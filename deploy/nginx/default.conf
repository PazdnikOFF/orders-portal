# Reverse proxy for the portal. Static is served directly; order files are
# delivered only via X-Accel-Redirect after Django authorizes the request
# (TЗ §17 — защита файлов от прямого доступа без авторизации).
#
# DNS-резолвер 127.0.0.11 — встроенный DNS Docker'а. Без него nginx резолвит
# имя контейнера `web` один раз при старте и кеширует IP. Если контейнер web
# пересоздаётся (`docker compose up -d --build`), IP меняется, и nginx бьёт
# в Connection refused. Используем переменную в proxy_pass — nginx тогда
# резолвит DNS на каждый запрос (с TTL 10s).

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    # Must be >= FILE_UPLOAD_MAX_SIZE (25 MB) + overhead.
    client_max_body_size 30m;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 7d;
    }

    # Internal-only: reachable solely through X-Accel-Redirect from the app.
    location /protected-files/ {
        internal;
        alias /data/orders/;
    }

    location / {
        set $upstream "web:8000";
        proxy_pass http://$upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
