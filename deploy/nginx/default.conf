# Reverse proxy for the portal. Static is served directly; order files are
# delivered only via X-Accel-Redirect after Django authorizes the request
# (TЗ §17 — защита файлов от прямого доступа без авторизации).

upstream portal_app {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Must be >= FILE_UPLOAD_MAX_SIZE (25 MB) + overhead.
    client_max_body_size 30m;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 7d;
    }

    # Internal-only: reachable solely through X-Accel-Redirect from the app.
    location /protected-files/ {
        internal;
        alias /data/orders/;
    }

    location / {
        proxy_pass http://portal_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
