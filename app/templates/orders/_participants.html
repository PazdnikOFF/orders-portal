<div data-participants>
  <div class="participant-rows">
    {% for item in participant_values %}
      <div class="participant-row">
        {% include "orders/_org_combo.html" with name="participant_orgs" value_org=item.org display=item.display removable=True %}
      </div>
    {% empty %}
      <div class="participant-row">
        {% include "orders/_org_combo.html" with name="participant_orgs" value_org=None removable=True %}
      </div>
    {% endfor %}
  </div>
  <button type="button" class="btn ghost sm" onclick="addParticipantRow(this)">+ организация</button>
</div>
