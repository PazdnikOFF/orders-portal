{% if orgs %}
  {% for org in orgs %}
    <button type="button" class="org-option" data-org-id="{{ org.pk }}"
            data-inn="{{ org.inn }}" data-display="{{ org.display_name }}"
            data-rusprofile="{{ org.rusprofile_url }}" onclick="selectOrgOption(this)">
      <span class="oo-name">{{ org.name|default:org.full_name }}</span>
      <span class="muted">ИНН {{ org.inn }}</span>
    </button>
  {% endfor %}
{% else %}
  <div class="org-option-msg muted">
    Дистрибьютор не найден. Если его нет в справочнике —
    попросите администратора добавить его.
  </div>
{% endif %}
